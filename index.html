<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REM – Ombre e Chimere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{--purple:#49274f;--purple-dark:#32193a;--purple-deep:#1e0f23;--black:#130b16;--orange:#f5a77f;--tertiary:#D3D3D3;--grey:#5b5b5b;--lightgrey:#dbdbdb;--ghost:#f5f3f7;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--ghost);font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;}
.cursor{position:fixed;width:8px;height:8px;background:var(--orange);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;display:none;}
.cursor-ring{position:fixed;width:30px;height:30px;border:1px solid rgba(245,167,127,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform 0.2s ease;}
body.has-cursor{cursor:none;}
body.has-cursor .cursor,body.has-cursor .cursor-ring{display:block;}
body.has-cursor a,body.has-cursor button{cursor:none;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' result='noise'/%3E%3CfeColorMatrix in='noise' type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='256' height='256' fill='%23130b16' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");pointer-events:none;z-index:1;}
.page{display:none;}.page.active{display:block;}
nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:1rem 3rem;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(19,11,22,0.96),transparent);backdrop-filter:blur(8px);}
.nav-logo{display:flex;align-items:center;text-decoration:none;}
.nav-logo img{height:52px;width:auto;display:block;transition:opacity 0.3s;}
.nav-logo img:hover{opacity:0.8;}
.nav-links{display:flex;gap:2.2rem;list-style:none;}
.nav-links a{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--tertiary);text-decoration:none;opacity:0.65;transition:opacity 0.3s,color 0.3s;}
.nav-links a:hover,.nav-links a.active-nav{opacity:1;color:var(--orange);}
body.page-magazine .nav-links{display:none!important;}
body.page-magazine .footer-sponsors{display:none!important;}
body.page-magazine .footer-links{display:none!important;}
body.article-stanza-grigia-intro .nav-logo{pointer-events:none;cursor:default;}
body.article-stanza-grigia-intro .nav-logo img:hover{opacity:1;}
body.article-stanza-grigia-intro .nav-links{display:none!important;}
body.article-stanza-grigia-intro .art-article-footer-sponsors{display:none!important;}
body.article-stanza-grigia-intro .art-footer-home-link{display:none!important;}
body.article-mary-shelley .nav-logo{pointer-events:none;cursor:default;}
body.article-mary-shelley .nav-logo img:hover{opacity:1;}
body.article-mary-shelley .nav-links{display:none!important;}
body.article-mary-shelley .art-article-footer-sponsors{display:none!important;}
body.article-mary-shelley .art-footer-home-link{display:none!important;}
body.article-mary-shelley .art-footer-registrati-link{display:none!important;}
body.article-infusi-di-chimera .art-footer-home-link{display:none!important;}
body.article-infusi-di-chimera .art-footer-registrati-link{display:none!important;}
body.article-suspiria .art-footer-home-link{display:none!important;}
body.article-suspiria .art-footer-registrati-link{display:none!important;}
body.article-meshes-of-the-afternoon .art-footer-home-link{display:none!important;}
body.article-meshes-of-the-afternoon .art-footer-registrati-link{display:none!important;}
body.article-urlo-del-bosco .art-footer-home-link{display:none!important;}
body.article-urlo-del-bosco .art-footer-registrati-link{display:none!important;}
/* Cent'anni — nasconde Home e Registrati nel footer */
body.article-centanni .art-footer-home-link{display:none!important;}
body.article-centanni .art-footer-registrati-link{display:none!important;}
body.article-centanni .art-footer-home-link{display:none!important;}
body.article-centanni .art-footer-registrati-link{display:none!important;}
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden;text-align:center;padding:6rem 2rem 4rem;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 55% 55% at 15% 65%,rgba(73,39,79,0.6) 0%,transparent 65%),radial-gradient(ellipse 40% 50% at 85% 25%,rgba(50,25,58,0.5) 0%,transparent 65%);pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);animation:drift 14s ease-in-out infinite;pointer-events:none;}
.orb1{width:450px;height:450px;background:rgba(73,39,79,0.35);top:-15%;left:-8%;}
.orb2{width:280px;height:280px;background:rgba(245,167,127,0.09);top:55%;right:3%;animation-delay:-5s;}
.orb3{width:180px;height:180px;background:rgba(73,39,79,0.22);top:25%;left:65%;animation-delay:-9s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(18px,-25px) scale(1.04)}66%{transform:translate(-12px,18px) scale(0.96)}}
.hero-eyebrow{font-size:0.62rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--orange);margin-bottom:2rem;position:relative;animation:fadeUp 1.2s ease forwards;opacity:0;}
.hero-title{margin-bottom:0.5rem;animation:fadeUp 1.2s ease 0.2s forwards;opacity:0;}
.hero-title img{display:block;margin:0 auto;height:clamp(160px,20vw,300px);width:auto;}
.hero-subtitle{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,2rem);font-style:italic;font-weight:300;color:var(--tertiary);letter-spacing:0.15em;margin-bottom:3rem;animation:fadeUp 1.2s ease 0.4s forwards;opacity:0;}
.hero-divider{width:1px;height:55px;background:linear-gradient(to bottom,var(--orange),transparent);margin:0 auto 3rem;animation:fadeUp 1.2s ease 0.5s forwards;opacity:0;}
.hero-question{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2.5vw,1.6rem);font-style:italic;color:var(--lightgrey);max-width:600px;line-height:1.8;animation:fadeUp 1.2s ease 0.6s forwards;opacity:0;}
.hero-cta{display:flex;gap:1.5rem;margin-top:3.5rem;flex-wrap:wrap;justify-content:center;animation:fadeUp 1.2s ease 0.8s forwards;opacity:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.btn{font-family:'Raleway',sans-serif;font-size:0.63rem;letter-spacing:0.3em;text-transform:uppercase;text-decoration:none;padding:1rem 2.5rem;transition:all 0.35s ease;}
.btn-primary{background:transparent;border:1px solid var(--orange);color:var(--orange);}
.btn-primary:hover{background:var(--orange);color:var(--black);}
.btn-secondary{background:transparent;border:1px solid rgba(211,211,211,0.25);color:var(--tertiary);}
.btn-secondary:hover{border-color:var(--tertiary);color:var(--ghost);}
#info-strip{background:linear-gradient(135deg,var(--purple-deep),var(--purple));border-top:1px solid rgba(245,167,127,0.15);border-bottom:1px solid rgba(245,167,127,0.15);}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));max-width:900px;margin:0 auto;padding:2.5rem 3rem;}
.info-item{text-align:center;padding:1.5rem;border-right:1px solid rgba(245,167,127,0.12);}
.info-item:last-child{border-right:none;}
.info-icon{font-size:1.3rem;margin-bottom:0.7rem;display:block;}
.info-label{font-size:0.53rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--orange);margin-bottom:0.4rem;display:block;}
.info-value{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--ghost);font-style:italic;}
section{position:relative;}
.section-inner{max-width:1100px;margin:0 auto;padding:7rem 3rem;}
.section-label{font-size:0.58rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--orange);margin-bottom:0.9rem;display:block;}
.section-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:400;color:var(--ghost);margin-bottom:2.5rem;line-height:1.2;}
.section-text{font-family:'Cormorant Garamond',serif;font-size:1.2rem;line-height:1.9;color:var(--tertiary);max-width:680px;}
#about{background:var(--purple-deep);}
.about-layout{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;}
.about-visual{position:relative;height:380px;display:flex;align-items:center;justify-content:center;}
.about-circle{position:absolute;border-radius:50%;border:1px solid;animation:rotateOrbit 22s linear infinite;}
.about-circle:nth-child(1){width:280px;height:280px;border-color:rgba(73,39,79,0.7);animation-duration:28s;}
.about-circle:nth-child(2){width:190px;height:190px;border-color:rgba(245,167,127,0.28);animation-duration:18s;animation-direction:reverse;}
.about-circle:nth-child(3){width:110px;height:110px;border-color:rgba(211,211,211,0.15);animation-duration:13s;}
.about-center{width:45px;height:45px;border-radius:50%;background:radial-gradient(circle,var(--orange),var(--purple));filter:blur(3px);z-index:1;}
@keyframes rotateOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#dimensions{background:var(--black);}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:4rem;}
.dim-card{padding:4rem 3.5rem;position:relative;overflow:hidden;transition:transform 0.4s ease;}
.dim-card:hover{transform:translateY(-5px);}
.dim-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.4s;}
.dim-card:hover::before{opacity:1;}
.ombre-card{background:linear-gradient(135deg,rgba(19,11,22,1) 0%,rgba(50,25,58,0.6) 100%);border:1px solid rgba(73,39,79,0.35);}
.ombre-card::before{background:radial-gradient(ellipse at 0% 0%,rgba(73,39,79,0.18),transparent 70%);}
.chimere-card{background:linear-gradient(135deg,rgba(19,11,22,1) 0%,rgba(73,39,79,0.45) 100%);border:1px solid rgba(245,167,127,0.2);}
.chimere-card::before{background:radial-gradient(ellipse at 100% 0%,rgba(245,167,127,0.08),transparent 70%);}
.dim-number{font-family:'Cinzel',serif;font-size:5rem;font-weight:400;color:rgba(255,255,255,0.04);line-height:1;margin-bottom:1.5rem;display:block;}
.dim-title{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--ghost);margin-bottom:1.5rem;letter-spacing:0.1em;}
.dim-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;line-height:1.85;color:var(--tertiary);}
.dim-accent-line{width:40px;height:1px;margin-bottom:1.5rem;}
.ombre-card .dim-accent-line{background:var(--grey);}
.chimere-card .dim-accent-line{background:var(--orange);}
#languages{background:var(--purple-deep);}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1.5rem;margin-top:3.5rem;}
.lang-item{padding:2rem 1.5rem;border:1px solid rgba(73,39,79,0.45);text-align:center;transition:border-color 0.3s,background 0.3s;}
.lang-item:hover{border-color:rgba(245,167,127,0.45);background:rgba(245,167,127,0.04);}
.lang-emoji{font-size:1.8rem;display:block;margin-bottom:0.8rem;}
.lang-name{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--tertiary);}
#team{background:var(--black);}
.team-intro{font-family:'Cormorant Garamond',serif;font-size:1.2rem;line-height:1.9;color:var(--tertiary);max-width:680px;margin-bottom:4rem;}
.team-roles{display:flex;flex-wrap:wrap;gap:1rem;}
.role-tag{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;padding:0.6rem 1.3rem;border:1px solid rgba(73,39,79,0.5);color:var(--tertiary);transition:all 0.3s;}
.role-tag:hover{background:rgba(73,39,79,0.2);border-color:var(--orange);color:var(--orange);}
#magazine-preview{background:var(--purple-deep);}
.mag-preview-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3.5rem;flex-wrap:wrap;gap:1.5rem;}
.mag-preview-cta{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--orange);text-decoration:none;border-bottom:1px solid rgba(245,167,127,0.3);padding-bottom:3px;transition:border-color 0.3s;}
.mag-preview-cta:hover{border-color:var(--orange);}
.mag-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;}
.article-card{border:1px solid rgba(73,39,79,0.35);background:rgba(73,39,79,0.06);transition:border-color 0.35s,transform 0.35s,background 0.35s;overflow:hidden;}
.article-card:hover{border-color:rgba(245,167,127,0.38);transform:translateY(-4px);background:rgba(73,39,79,0.13);}
.article-image{width:100%;height:200px;background:linear-gradient(135deg,var(--purple-deep),var(--purple));display:flex;align-items:center;justify-content:center;overflow:hidden;}
.article-image img{width:100%;height:100%;object-fit:cover;}
.article-image-placeholder{font-family:'Cinzel',serif;font-size:3rem;color:rgba(245,167,127,0.18);letter-spacing:0.1em;}
.article-body{padding:2rem;}
.article-meta{display:flex;gap:1.5rem;margin-bottom:1rem;align-items:center;}
.article-tag{font-size:0.52rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--orange);border:1px solid rgba(245,167,127,0.3);padding:0.25rem 0.7rem;}
.article-date{font-size:0.55rem;letter-spacing:0.1em;color:var(--grey);}
.article-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:400;color:var(--ghost);margin-bottom:1rem;line-height:1.4;letter-spacing:0.04em;}
.article-excerpt{font-family:'Cormorant Garamond',serif;font-size:1rem;line-height:1.75;color:var(--tertiary);}
.article-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;}
.article-author{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--grey);}
.article-read-more{font-size:0.55rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--orange);text-decoration:none;border-bottom:1px solid rgba(245,167,127,0.3);padding-bottom:2px;transition:border-color 0.3s;}
.article-read-more:hover{border-color:var(--orange);}
.article-card.featured{grid-column:1 / -1;display:grid;grid-template-columns:1fr 1fr;}
.article-card.featured .article-image{height:100%;min-height:280px;}
.article-card.featured .article-title{font-size:1.6rem;}
.article-card.featured .article-excerpt{font-size:1.1rem;}
#registration{background:linear-gradient(180deg,var(--black) 0%,var(--purple-deep) 50%,var(--purple) 100%);text-align:center;}
.reg-inner{max-width:640px;margin:0 auto;padding:8rem 3rem;}
.reg-desc{font-family:'Cormorant Garamond',serif;font-size:1.1rem;line-height:1.8;color:var(--tertiary);margin-bottom:3.5rem;}
.reg-ext-btn{display:inline-flex;align-items:center;gap:0.8rem;font-family:'Raleway',sans-serif;font-size:0.7rem;letter-spacing:0.35em;text-transform:uppercase;text-decoration:none;padding:1.3rem 2.5rem;border:1px solid var(--orange);color:var(--orange);transition:all 0.35s ease;}
.reg-ext-btn:hover{background:var(--orange);color:var(--black);}
.reg-ext-arrow{font-size:1rem;transition:transform 0.3s;display:inline-block;}
.reg-ext-btn:hover .reg-ext-arrow{transform:translate(3px,-3px);}
.reg-ext-note{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-style:italic;color:var(--grey);line-height:1.8;}
.footer-sponsors{border-top:1px solid rgba(73,39,79,0.3);padding:2.5rem 3rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;background:var(--black);}
.footer-sponsors-label{font-size:0.52rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--grey);}
.footer-sponsors-logos{display:flex;flex-wrap:wrap;gap:2.5rem;align-items:center;justify-content:center;}
.footer-sponsor-item{display:flex;align-items:center;justify-content:center;height:36px;opacity:0.45;transition:opacity 0.3s;text-decoration:none;}
.footer-sponsor-item:hover{opacity:0.9;}
.footer-sponsor-item img{max-height:36px;max-width:100px;object-fit:contain;filter:brightness(0) invert(1);}
.footer-sponsor-placeholder{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.15em;color:var(--grey);border:1px solid rgba(91,91,91,0.3);padding:0.4rem 1rem;white-space:nowrap;}
footer{background:var(--black);border-top:1px solid rgba(73,39,79,0.3);padding:4rem 3rem;text-align:center;}
.footer-logo{margin-bottom:0.5rem;}
.footer-logo img{height:64px;width:auto;display:inline-block;opacity:0.85;}
.footer-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--grey);font-size:0.95rem;margin-bottom:2.5rem;}
.footer-links{display:flex;gap:2.5rem;justify-content:center;list-style:none;margin-bottom:2.5rem;flex-wrap:wrap;}
.footer-links a{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color 0.3s;}
.footer-links a:hover{color:var(--orange);}
.footer-copy{font-size:0.58rem;color:rgba(255,255,255,0.12);letter-spacing:0.1em;}
.reveal{opacity:1;transform:translateY(0);}
.reveal.will-animate{opacity:0;transform:translateY(35px);transition:opacity 0.9s ease,transform 0.9s ease;}
.reveal.will-animate.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:0.12s;}.reveal-delay-2{transition-delay:0.28s;}.reveal-delay-3{transition-delay:0.44s;}
#page-magazine{background:var(--black);min-height:100vh;}
.mag-hero{min-height:42vh;display:flex;flex-direction:column;justify-content:flex-end;padding:10rem 3rem 4rem;position:relative;overflow:hidden;background:linear-gradient(160deg,var(--purple-deep) 0%,var(--purple) 100%);}
.mag-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 70% at 85% 50%,rgba(245,167,127,0.06),transparent 70%);pointer-events:none;}
.mag-hero-label{font-size:0.58rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--orange);margin-bottom:1rem;position:relative;z-index:1;}
.mag-hero-title{font-family:'Cinzel',serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:400;color:var(--ghost);letter-spacing:0.06em;line-height:1;position:relative;z-index:1;}
.mag-hero-desc{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-style:italic;color:var(--tertiary);max-width:500px;line-height:1.8;margin-top:1.5rem;position:relative;z-index:1;}
.mag-content{max-width:1100px;margin:0 auto;padding:5rem 3rem;}
.mag-filters{display:flex;gap:1rem;margin-bottom:4rem;flex-wrap:wrap;}
.mag-filter{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;padding:0.5rem 1.3rem;border:1px solid rgba(73,39,79,0.45);color:var(--grey);background:transparent;transition:all 0.3s;}
.mag-filter:hover,.mag-filter.active{border-color:var(--orange);color:var(--orange);background:rgba(245,167,127,0.04);}
.articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2rem;}
#page-article{background:var(--black);min-height:100vh;}
.art-hero{min-height:55vh;display:flex;flex-direction:column;justify-content:flex-end;padding:10rem 3rem 4rem;position:relative;overflow:hidden;background:linear-gradient(160deg,var(--purple-deep) 0%,var(--purple) 100%);}
.art-hero-image{position:absolute;inset:0;background:linear-gradient(135deg,var(--purple-deep),var(--purple));display:flex;align-items:center;justify-content:center;}
.art-hero-image img{width:100%;height:100%;object-fit:cover;opacity:0.35;}
.art-hero-image-placeholder{font-family:'Cinzel',serif;font-size:6rem;color:rgba(245,167,127,0.08);}
.art-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(19,11,22,0.95) 30%,rgba(19,11,22,0.3) 100%);}
.art-hero-content{position:relative;z-index:1;max-width:800px;}
.art-back{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--orange);text-decoration:none;margin-bottom:2rem;opacity:0.7;transition:opacity 0.3s;}
.art-back:hover{opacity:1;}
.art-hero-meta{display:flex;gap:1.5rem;align-items:center;margin-bottom:1.2rem;}
.art-hero-tag{font-size:0.52rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--orange);border:1px solid rgba(245,167,127,0.35);padding:0.3rem 0.8rem;}
.art-hero-date{font-size:0.55rem;letter-spacing:0.1em;color:var(--grey);}
.art-hero-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,3.5rem);font-weight:400;color:var(--ghost);line-height:1.2;letter-spacing:0.04em;margin-bottom:1.2rem;}
.art-hero-author{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey);}
.art-body{max-width:720px;margin:0 auto;padding:5rem 3rem 7rem;}
.art-lead{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;line-height:1.8;color:var(--tertiary);margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid rgba(73,39,79,0.3);}
.art-text{font-family:'Cormorant Garamond',serif;font-size:1.15rem;line-height:2;color:var(--lightgrey);}
.art-text p{margin-bottom:1.8rem;}
.art-text h3{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--ghost);letter-spacing:0.08em;margin:2.5rem 0 1rem;}
.art-text blockquote{border-left:2px solid var(--orange);padding-left:1.5rem;margin:2rem 0;font-style:italic;color:var(--tertiary);}
.art-text ul{list-style:none;padding:0;margin:1rem 0 1.8rem 0;}
.art-text ul li{padding-left:1.4rem;margin-bottom:0.7rem;position:relative;}
.art-text ul li::before{content:'–';position:absolute;left:0;color:var(--orange);}
.art-footer-nav{max-width:720px;margin:0 auto;padding:2.5rem 3rem 5rem;border-top:1px solid rgba(73,39,79,0.3);}
.art-footer-back{display:inline-flex;align-items:center;gap:0.6rem;font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--orange);text-decoration:none;border:1px solid rgba(245,167,127,0.2);padding:0.6rem 1.2rem;transition:all 0.3s;}
.art-footer-back:hover{background:rgba(245,167,127,0.07);border-color:var(--orange);}
#page-sponsor{background:var(--black);min-height:100vh;}
.sp-hero{min-height:38vh;display:flex;flex-direction:column;justify-content:flex-end;padding:10rem 3rem 4rem;position:relative;overflow:hidden;background:linear-gradient(160deg,var(--purple-deep) 0%,var(--purple) 100%);}
.sp-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 70% at 10% 60%,rgba(73,39,79,0.35),transparent 65%);pointer-events:none;}
.sp-hero-label{font-size:0.58rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--orange);margin-bottom:1rem;position:relative;z-index:1;}
.sp-hero-title{font-family:'Cinzel',serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:400;color:var(--ghost);letter-spacing:0.06em;line-height:1;position:relative;z-index:1;}
.sp-hero-desc{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-style:italic;color:var(--tertiary);max-width:560px;line-height:1.8;margin-top:1.5rem;position:relative;z-index:1;}
.sp-content{max-width:1100px;margin:0 auto;padding:5rem 3rem;}
.sp-tier{margin-bottom:5rem;}
.sp-tier-header{display:flex;align-items:center;gap:1.5rem;margin-bottom:2.5rem;}
.sp-tier-line{flex:1;height:1px;}
.sp-tier-label{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.35em;text-transform:uppercase;padding:0.4rem 1.2rem;border:1px solid;white-space:nowrap;}
.sp-tier.gold .sp-tier-line{background:linear-gradient(to right,transparent,var(--orange),transparent);}
.sp-tier.gold .sp-tier-label{border-color:var(--orange);color:var(--orange);}
.sp-tier.silver .sp-tier-line{background:linear-gradient(to right,transparent,var(--tertiary),transparent);}
.sp-tier.silver .sp-tier-label{border-color:var(--tertiary);color:var(--tertiary);}
.sp-tier.partner .sp-tier-line{background:linear-gradient(to right,transparent,var(--grey),transparent);}
.sp-tier.partner .sp-tier-label{border-color:var(--grey);color:var(--grey);}
.sp-grid{display:grid;gap:1.5rem;}
.sp-tier.gold .sp-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
.sp-tier.silver .sp-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
.sp-tier.partner .sp-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
.sp-card{border:1px solid rgba(73,39,79,0.35);background:rgba(73,39,79,0.05);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;gap:1rem;transition:border-color 0.3s,background 0.3s,transform 0.3s;}
.sp-card:hover{border-color:rgba(245,167,127,0.4);background:rgba(73,39,79,0.12);transform:translateY(-3px);}
.sp-tier.gold .sp-card{padding:3rem 2.5rem;}.sp-tier.partner .sp-card{padding:1.8rem 1.5rem;}
.sp-logo-box{width:100%;display:flex;align-items:center;justify-content:center;}
.sp-tier.gold .sp-logo-box{height:80px;}.sp-tier.silver .sp-logo-box{height:60px;}.sp-tier.partner .sp-logo-box{height:44px;}
.sp-logo-box img{max-width:100%;max-height:100%;object-fit:contain;filter:brightness(0) invert(1);opacity:0.75;transition:opacity 0.3s;}
.sp-card:hover .sp-logo-box img{opacity:1;}
.sp-logo-placeholder{font-family:'Cinzel',serif;letter-spacing:0.15em;color:rgba(211,211,211,0.2);text-align:center;line-height:1.3;}
.sp-tier.gold .sp-logo-placeholder{font-size:1.1rem;}.sp-tier.silver .sp-logo-placeholder{font-size:0.9rem;}.sp-tier.partner .sp-logo-placeholder{font-size:0.75rem;}
.sp-name{font-family:'Raleway',sans-serif;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey);text-align:center;}
.sp-cta-box{margin-top:5rem;padding:4rem 3rem;border:1px solid rgba(73,39,79,0.4);background:linear-gradient(135deg,rgba(73,39,79,0.1),rgba(19,11,22,0.8));text-align:center;}
.sp-cta-label{font-size:0.58rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--orange);margin-bottom:1rem;display:block;}
.sp-cta-title{font-family:'Cinzel',serif;font-size:clamp(1.4rem,3vw,2.2rem);color:var(--ghost);margin-bottom:1.5rem;line-height:1.3;}
.sp-cta-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--tertiary);max-width:560px;margin:0 auto 2.5rem;line-height:1.8;}
.sp-cta-email{display:inline-block;font-family:'Raleway',sans-serif;font-size:0.63rem;letter-spacing:0.3em;text-transform:uppercase;padding:1rem 2.5rem;border:1px solid var(--orange);color:var(--orange);transition:all 0.35s ease;}
.sp-cta-email:hover{background:var(--orange);color:var(--black);}
.sp-howto{margin-top:3rem;padding:1.8rem 2.5rem;border:1px dashed rgba(73,39,79,0.4);background:rgba(73,39,79,0.04);}
.sp-howto-title{font-family:'Cinzel',serif;font-size:0.8rem;color:var(--orange);letter-spacing:0.15em;margin-bottom:0.6rem;}
.sp-howto-text{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-style:italic;color:var(--grey);line-height:1.7;}
@media(max-width:768px){nav{padding:1rem 1.5rem;}.nav-links{display:none;}.section-inner{padding:5rem 1.5rem;}.about-layout{grid-template-columns:1fr;gap:3rem;}.about-visual{height:220px;}.dim-grid{grid-template-columns:1fr;}.article-card.featured{grid-template-columns:1fr;}}
</style>
</head>
